# Scraper settings
scraper:
  # Target base URL
  base_url: "https://companiesmarketcap.com"

  # Number of pages to scrape. 0 = auto-detect all pages via pagination
  pages: 0

  # Cache TTL for HTTP responses. Accepts Go duration format (h, m, s).
  # Reduces requests on repeated runs.
  cache_ttl: 24h

  # Random delay between requests. Helps avoid rate limiting.
  # Accepts Go duration format (ms, s, m).
  delay: 500ms

  # Number of concurrent workers. 0 = auto (NumCPU * 2).
  workers: 0

  # User-Agent header sent with each request
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"

  # Directory for HTTP response cache.
  # Reduces requests on repeated runs.
  cache_dir: "./colly_cache"

  # Maximum number of retries on failed requests (0 = no retry).
  # Uses exponential backoff: delay * 2^(attempt-1), caps at delay * 4.
  retry_count: 3

  # Base delay for retry backoff. Accepts Go duration format (ms, s).
  retry_delay: 1s

# Output settings
output:
  # Directory where CSV files are written
  dir: "."

  # Prefix for the output filename (final: {prefix}{date}.csv)
  filename_prefix: "companies_"
